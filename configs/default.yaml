# 基于深度学习的人体动作矫正系统 - 默认配置

project:
  name: "Human Action Correction System"
  version: "0.1.0"
  author: "张玉倍"
  student_id: "U202215369"

# 姿态估计配置
pose_estimation:
  backend: "mediapipe"          # mediapipe / openpose
  model_complexity: 1           # 0: Lite, 1: Full, 2: Heavy
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5
  enable_segmentation: false

# 动作对比配置
action_comparison:
  algorithm: "dtw"              # dtw / fastdtw / ddtw
  distance_metric: "euclidean"  # euclidean / cosine / manhattan
  window_size: null             # Sakoe-Chiba 带宽约束，null 表示不限制
  threshold: 0.3                # 动作相似度阈值

# 摄像头配置
camera:
  device_id: 0
  width: 640
  height: 480
  fps: 30

# 深度学习模型配置
model:
  backbone_type: "bilstm"         # stgcn / bilstm / transformer
  num_classes: 5                  # 动作类别数（与 actions.categories 一致）
  input_dim: 20                   # 特征向量维度（角度8 + 骨骼比12）
  hidden_dim: 128                 # 隐藏层维度
  num_layers: 2                   # 网络层数
  num_heads: 4                    # 注意力头数（Transformer 用）
  dropout: 0.3                    # Dropout 比率
  num_joints: 33                  # 关键点数量
  in_channels: 4                  # 输入通道数（x, y, z, visibility）
  target_frames: 60               # 序列统一长度
  learning_rate: 0.001
  weight_decay: 0.0001            # AdamW 权重衰减
  batch_size: 32
  epochs: 100
  patience: 10                    # 早停耐心值
  lambda_quality: 0.5             # 质量评分损失权重
  seed: 42                        # 随机种子
  input_mode: "keypoints"         # keypoints / features
  checkpoint_dir: "outputs/checkpoints"

# 标准动作模板配置
actions:
  templates_dir: "data/templates"      # 模板存储根目录
  default_target_frames: 60            # 默认归一化帧数
  categories:
    squat:
      display_name: "深蹲"
      description: "标准深蹲动作 — 双脚与肩同宽，臀部下沉至大腿与地面平行"
    arm_raise:
      display_name: "举臂"
      description: "标准举臂动作 — 双臂从体侧抬起至过头顶伸直"
    side_bend:
      display_name: "侧弯"
      description: "标准侧弯动作 — 单手叉腰，另一侧手臂引导躯干侧向弯曲"
    lunge:
      display_name: "弓步"
      description: "标准弓步动作 — 前腿屈膝90度，后腿膝盖接近地面"
    standing_stretch:
      display_name: "站立拉伸"
      description: "标准站立拉伸 — 双臂上举，身体向上延伸"

# 数据增强配置
augmentation:
  time_warp_range: [0.8, 1.2]          # 时间拉伸/压缩范围
  noise_std: 0.005                     # 高斯噪声标准差
  mirror_enabled: true                 # 是否启用左右镜像
  augment_per_template: 5              # 每个模板生成的增强样本数

# 输出与日志
output:
  save_dir: "outputs/"
  log_dir: "logs/"
  visualization: true
